name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  unit-tests:
    name: Unit + Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Lua + busted
        run: |
          sudo apt-get update
          sudo apt-get install -y luarocks lua5.1 liblua5.1-dev
          sudo luarocks install busted
          sudo luarocks install dkjson

      - name: Install Neovim
        run: |
          curl -fsSL https://github.com/neovim/neovim/releases/download/stable/nvim-linux-x86_64.tar.gz \
            | sudo tar xz -C /opt
          sudo ln -s /opt/nvim-linux-x86_64/bin/nvim /usr/local/bin/nvim
          nvim --version | head -1

      - name: Run busted tests
        run: busted

      - name: Run integration tests
        run: nvim --headless --clean -u NONE -l spec/nvim_harness.lua

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    # E2E requires SageFs global tool + .NET 10 — non-blocking until infra is stable
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install SageFs
        run: |
          dotnet tool install --global SageFs
          sagefs --version || echo "sagefs --version not supported"

      - name: Install Lua + busted
        run: |
          sudo apt-get update
          sudo apt-get install -y luarocks lua5.1 liblua5.1-dev
          sudo luarocks install busted
          sudo luarocks install dkjson

      - name: Install Neovim
        run: |
          curl -fsSL https://github.com/neovim/neovim/releases/download/stable/nvim-linux-x86_64.tar.gz \
            | sudo tar xz -C /opt
          sudo ln -s /opt/nvim-linux-x86_64/bin/nvim /usr/local/bin/nvim

      - name: Build sample projects
        run: |
          for d in samples/Minimal samples/WithTests samples/MultiFile; do
            dotnet build "$d" --nologo -v q
          done

      - name: Smoke test SageFs daemon
        run: |
          sagefs --supervised --proj samples/Minimal/Minimal.fsproj --port 47700 &
          SAGEFS_PID=$!
          echo "SageFs PID: $SAGEFS_PID"
          for i in $(seq 1 30); do
            if curl -sf http://localhost:47700/health > /dev/null 2>&1; then
              echo "SageFs healthy after ${i}s"
              kill $SAGEFS_PID 2>/dev/null || true
              exit 0
            fi
            sleep 2
          done
          echo "SageFs failed to start — dumping stderr"
          kill $SAGEFS_PID 2>/dev/null || true
          exit 1

      - name: Run E2E suites
        run: |
          for spec in spec/e2e/e2e_*_spec.lua; do
            echo "--- Running $spec ---"
            nvim --headless --clean -u NONE -l "$spec"
          done
