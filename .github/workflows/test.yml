name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit + Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Lua + busted
        run: |
          sudo apt-get update
          sudo apt-get install -y luarocks lua5.1 liblua5.1-dev
          sudo luarocks install busted
          sudo luarocks install dkjson

      - name: Install Neovim
        run: |
          curl -fsSL https://github.com/neovim/neovim/releases/download/stable/nvim-linux-x86_64.tar.gz \
            | sudo tar xz -C /opt
          sudo ln -s /opt/nvim-linux-x86_64/bin/nvim /usr/local/bin/nvim
          nvim --version | head -1

      - name: Run busted tests
        run: busted

      - name: Run integration tests
        run: nvim --headless --clean -u NONE -l spec/nvim_harness.lua

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    env:
      DOTNET_ROOT: /usr/share/dotnet
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install SageFs
        run: |
          dotnet tool install --global SageFs
          export PATH="$HOME/.dotnet/tools:$PATH"
          which sagefs
          sagefs --help | head -3 || true

      - name: Install Lua + busted
        run: |
          sudo apt-get update
          sudo apt-get install -y luarocks lua5.1 liblua5.1-dev
          sudo luarocks install busted
          sudo luarocks install dkjson

      - name: Install Neovim
        run: |
          curl -fsSL https://github.com/neovim/neovim/releases/download/stable/nvim-linux-x86_64.tar.gz \
            | sudo tar xz -C /opt
          sudo ln -s /opt/nvim-linux-x86_64/bin/nvim /usr/local/bin/nvim

      - name: Build sample projects
        run: |
          for d in samples/Minimal samples/WithTests samples/MultiFile; do
            dotnet build "$d" --nologo -v q
          done

      - name: Smoke test SageFs daemon
        id: smoke
        run: |
          export PATH="$HOME/.dotnet/tools:$PATH"
          # Check if sagefs supports --supervised (required for E2E)
          HELP_TEXT=$(sagefs --help 2>&1 || true)
          if echo "$HELP_TEXT" | grep -q 'supervised'; then
            echo "sagefs supports --supervised"
          else
            echo "::warning::sagefs NuGet version does not support --supervised/--port flags (needed for E2E)"
            echo "skip_e2e=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          sagefs --supervised --proj samples/Minimal/Minimal.fsproj --mcp-port 47700 > /tmp/sagefs-smoke.log 2>&1 &
          SAGEFS_PID=$!
          echo "SageFs PID: $SAGEFS_PID"
          for i in $(seq 1 60); do
            if curl -sf http://localhost:47700/health > /dev/null 2>&1; then
              echo "SageFs healthy after $((i*2))s"
              kill $SAGEFS_PID 2>/dev/null || true
              exit 0
            fi
            sleep 2
          done
          echo "=== SageFs smoke test failed — daemon log ==="
          cat /tmp/sagefs-smoke.log || true
          kill $SAGEFS_PID 2>/dev/null || true
          exit 1

      - name: Run E2E suites
        if: steps.smoke.outputs.skip_e2e != 'true'
        env:
          PATH: /home/runner/.dotnet/tools:/opt/nvim-linux-x86_64/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        run: |
          for spec in spec/e2e/e2e_*_spec.lua; do
            echo "--- Running $spec ---"
            nvim --headless --clean -u NONE -l "$spec"
          done
